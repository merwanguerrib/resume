[build]
  base = "."
  command = "npm run build && npm run schema:validate:dist -- --strict"
  publish = "dist"

# Domain migration and canonicalization:
# - Redirect old brand domain (all pages) to the new agency domain
# - Force HTTPS
# - Keep only the apex host as canonical
# - Normalize trailing slash to avoid duplicate/dead URLs
[[redirects]]
  from = "http://merwanguerrib.com/*"
  to = "https://justdevit.agency/:splat"
  status = 301
  force = true

[[redirects]]
  from = "https://merwanguerrib.com/*"
  to = "https://justdevit.agency/:splat"
  status = 301
  force = true

[[redirects]]
  from = "http://www.merwanguerrib.com/*"
  to = "https://justdevit.agency/:splat"
  status = 301
  force = true

[[redirects]]
  from = "https://www.merwanguerrib.com/*"
  to = "https://justdevit.agency/:splat"
  status = 301
  force = true

[[redirects]]
  from = "https://www.justdevit.agency/*"
  to = "https://justdevit.agency/:splat"
  status = 301
  force = true

[[redirects]]
  from = "http://www.justdevit.agency/*"
  to = "https://justdevit.agency/:splat"
  status = 301
  force = true

# Auto language routing on the root URL:
# - French browser => /fr/
# - Other languages => keep /
[[redirects]]
  from = "/"
  to = "/fr/"
  status = 302
  force = false
  conditions = { Language = ["fr"] }

[[headers]]
  for = "/sitemap.xml"
  [headers.values]
    Content-Type = "application/xml; charset=UTF-8"
    X-Content-Type-Options = "nosniff"

[[headers]]
  for = "/sitemap-en.xml"
  [headers.values]
    Content-Type = "application/xml; charset=UTF-8"
    X-Content-Type-Options = "nosniff"

[[headers]]
  for = "/sitemap-fr.xml"
  [headers.values]
    Content-Type = "application/xml; charset=UTF-8"
    X-Content-Type-Options = "nosniff"
