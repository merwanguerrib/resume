name: PR Quality Gates

on:
  pull_request:
    types: [opened, synchronize, reopened, ready_for_review]

permissions:
  contents: read

jobs:
  quality:
    name: Schema + Lighthouse
    if: github.event.pull_request.draft == false
    runs-on: ubuntu-latest
    timeout-minutes: 25

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build site
        run: npm run build

      - name: Validate schema markup (all pages)
        run: npm run schema:validate:dist -- --strict

      - name: Run Lighthouse CI
        run: npm run lighthouse:ci
